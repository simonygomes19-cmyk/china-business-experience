<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="br"><circle cx="392" cy="512" r="232"/></clipPath>
    <clipPath id="cn"><circle cx="632" cy="512" r="232"/></clipPath>
  </defs>

  <!-- fundo premium -->
  <rect width="1024" height="1024" fill="#0a0b0e"/>
  <rect width="1024" height="1024" fill="url(#g)"/>
  <radialGradient id="g" cx="50%" cy="38%" r="75%">
    <stop offset="0%" stop-color="#16181f"/>
    <stop offset="100%" stop-color="#0a0b0e"/>
  </radialGradient>

  <!-- Bandeira do Brasil (selo esquerdo) -->
  <g clip-path="url(#br)">
    <rect x="150" y="270" width="490" height="490" fill="#009c3b"/>
    <polygon points="392,322 590,512 392,702 194,512" fill="#ffdf00"/>
    <circle cx="392" cy="512" r="92" fill="#002776"/>
    <path d="M306 500 a92 92 0 0 1 172 28" fill="none" stroke="#fff" stroke-width="14"/>
  </g>
  <circle cx="392" cy="512" r="232" fill="none" stroke="#c8a464" stroke-width="7"/>

  <!-- Bandeira da China (selo direito, sobreposto) -->
  <g clip-path="url(#cn)">
    <rect x="400" y="270" width="490" height="490" fill="#de2910"/>
    <text x="560" y="468" font-family="Helvetica,Arial,sans-serif" font-size="150" fill="#ffde00">★</text>
    <text x="690" y="408" font-family="Helvetica,Arial,sans-serif" font-size="52" fill="#ffde00">★</text>
    <text x="728" y="470" font-family="Helvetica,Arial,sans-serif" font-size="52" fill="#ffde00">★</text>
    <text x="722" y="540" font-family="Helvetica,Arial,sans-serif" font-size="52" fill="#ffde00">★</text>
    <text x="688" y="600" font-family="Helvetica,Arial,sans-serif" font-size="52" fill="#ffde00">★</text>
  </g>
  <circle cx="632" cy="512" r="232" fill="none" stroke="#0a0b0e" stroke-width="14"/>
  <circle cx="632" cy="512" r="232" fill="none" stroke="#c8a464" stroke-width="7"/>

  <text x="512" y="858" font-family="Helvetica,Arial,sans-serif" font-size="70" letter-spacing="8" fill="#c8a464" text-anchor="middle" font-weight="700">CHINA</text>
</svg>
